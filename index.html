let userArticles = [];
try { userArticles = JSON.parse(localStorage.getItem('motiferm0_articles') || '[]'); } catch(e){}

function save() { localStorage.setItem('motiferm0_articles', JSON.stringify(userArticles)); }

function getAllArticles() {
  const ua = userArticles.map(a => ({...a, fromTiktok:false}));
  const tk = TIKTOK.map(a => ({
    id: a.id,
    title: a.title,
    category: a.cat,
    subtitle: a.noTitle ? 'Post senza titolo · ' + a.likes + ' ❤' : a.likes + ' ❤ su TikTok',
    body: a.noTitle
      ? 'Questo post non aveva un titolo su TikTok.\n\nHa ricevuto ' + a.likes + ' like.\nData: ' + a.date
      : 'Questo articolo proviene dal tuo profilo TikTok.\n\nHa ricevuto ' + a.likes + ' like.\nData: ' + a.date,
    date: a.date,
    likes: a.likes,
    cover: a.cover,
    fromTiktok: true,
    noTitle: a.noTitle || false
  }));
  return [...ua, ...tk];
}

function imgTag(cover, cls) {
  if (!cover) return '';
  return `<img class="${cls}" src="${cover}" onerror="this.style.display='none'" loading="lazy" referrerpolicy="no-referrer">`;
}

function fallback(cat) {
  const icons = {Recensione:'🎬', Saggio:'✍️', Riflessione:'💭', Intervista:'🎙️', News:'📰', Lista:'📋'};
  return icons[cat] || '📄';
}

function showView(name, id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.header-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name==='home') { document.querySelector('.header-nav button:nth-child(1)').classList.add('active'); renderHome(); }
  else if (name==='all') { document.querySelector('.header-nav button:nth-child(2)').classList.add('active'); renderAll(); }
  else if (name==='new') { document.querySelector('.header-nav button:nth-child(3)').classList.add('active'); }
  else if (name==='detail' && id) renderDetail(id);
  window.scrollTo(0,0);
}

function renderHome() {
  const all = getAllArticles();
  const featured = all[0];
  const rest = all.slice(1,4);
  const fs = document.getElementById('featured-slot');
  if (!featured) { fs.innerHTML=''; return; }
  fs.innerHTML = `<div class="featured-article" onclick="showView('detail','${featured.id}')">
    <div class="featured-img">
      ${featured.cover ? `<img src="${featured.cover}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy" referrerpolicy="no-referrer">` : ''}
      <div class="fallback" style="${featured.cover?'display:none':''}">${fallback(featured.category)}</div>
    </div>
    <div class="featured-body">
      <div class="article-category">${featured.category}${featured.fromTiktok?' · TikTok':''}</div>
      <h2 class="article-title-big">${featured.title}</h2>
      <p class="article-excerpt">${featured.subtitle || ''}</p>
      <div class="article-meta">${featured.date}${featured.likes?' · '+featured.likes+' ❤':''}</div>
    </div>
  </div>`;
  document.getElementById('home-grid').innerHTML = rest.map(a => card(a)).join('');
}

function renderAll() {
  document.getElementById('all-grid').innerHTML = getAllArticles().map(a => card(a)).join('');
}

function card(a) {
  return `<div class="article-card" onclick="showView('detail','${a.id}')">
    <div class="card-thumb">
      ${a.cover ? `<img src="${a.cover}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" loading="lazy" referrerpolicy="no-referrer">` : ''}
      <div class="fallback" style="${a.cover?'display:none':''}">${fallback(a.category)}</div>
    </div>
    <div class="card-body">
      <div class="article-category" style="margin-bottom:8px">${a.category}${a.fromTiktok?' · TikTok':''}</div>
      <h3 class="article-title-sm">${a.noTitle ? '<em style="color:var(--muted)">Senza titolo</em>' : a.title}</h3>
      <p class="article-snippet">${a.subtitle||''}</p>
      <div class="card-footer">
        <span class="tag">${a.date}</span>
        ${a.likes ? `<span class="likes-badge">❤ ${a.likes.toLocaleString()}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function renderDetail(id) {
  const a = getAllArticles().find(x => String(x.id)===String(id));
  if (!a) return;
  const cover = document.getElementById('det-cover');
  if (a.cover) { cover.src=a.cover; cover.style.display='block'; } else { cover.style.display='none'; }
  document.getElementById('det-cat').textContent = a.category + (a.fromTiktok?' · Da TikTok':'');
  document.getElementById('det-title').textContent = a.noTitle ? '[ Post senza titolo ]' : a.title;
  document.getElementById('det-meta').textContent = a.date + (a.likes?' · '+a.likes.toLocaleString()+' ❤ su TikTok':'');
  document.getElementById('det-body').textContent = a.body;
}

function publishArticle() {
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  if (!title||!body) { alert('Titolo e testo obbligatori.'); return; }
  const art = {
    id: Date.now(),
    title,
    category: document.getElementById('f-cat').value,
    subtitle: document.getElementById('f-sub').value.trim(),
    body,
    date: new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})
  };
  userArticles.unshift(art);
  save();
  ['f-title','f-sub','f-body'].forEach(i => document.getElementById(i).value='');
  document.getElementById('pub-msg').style.display='block';
  setTimeout(()=>{ document.getElementById('pub-msg').style.display='none'; showView('home'); }, 1200);
}

document.getElementById('current-date').textContent =
  new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

renderHome();
</script>
