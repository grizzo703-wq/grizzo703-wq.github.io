name: Download TikTok Images
on:
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download images and update HTML
        run: python3 download_covers.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add images/ index.html
          git commit -m "Add cover images" || echo "Nothing to commit"
          git push
